apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/ssh-jmartinez/ocp-fullstack-gitops-delivery.git
    targetRevision: HEAD
    path: k8s-manifests/monitoring
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated: {prune: true, selfHeal: true}