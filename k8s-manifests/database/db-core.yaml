apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: database-postgresql
  namespace: openshift-gitops
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: 15.5.2
      helm:
        valueFiles:
          - $values/k8s-manifests/database/db-values.yaml
    - repoURL: https://github.com/ssh-jmartinez/ocp-fullstack-gitops-delivery.git
      targetRevision: main
      ref: values